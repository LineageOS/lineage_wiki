<nav class="navbar fixed-top navbar-expand-lg mb-0 rounded-0">
  <div class="container">
    <div class="navbar-translate">
      <a class="navbar-brand font-weight-bold" href="{{ site.baseurl }}/">{{ site.title }}</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="sr-only">Toggle navigation</span>
        <span class="navbar-toggler-icon"></span>
        <span class="navbar-toggler-icon"></span>
        <span class="navbar-toggler-icon"></span>
      </button>
      </div>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          {% assign url = page.url %}
          <li class="nav-item{% if url contains '/devices/' %} active{% endif %}">
            <a href="{{ site.baseurl }}/devices/" class="nav-link"{% if url contains '/devices/' %} aria-current="page"{% endif %}>Devices</a>
          </li>
          <li class="nav-item{% if url == '/contributing.html' %} active{% endif %}">
            <a href="{{ site.baseurl }}/contributing.html" class="nav-link"{% if url == '/contributing.html' %} aria-current="page"{% endif %}>Contribute</a>
          </li>
          <li class="nav-item{% if url == '/faq.html' %} active{% endif %}">
            <a href="{{ site.baseurl }}/faq.html" class="nav-link"{% if url == '/faq.html' %} aria-current="page"{% endif %}>FAQ</a>
          </li>
          <li class="nav-item{% if url contains '/glossary/' %} active{% endif %}">
            <a href="{{ site.baseurl }}/glossary/" class="nav-link"{% if url contains '/glossary/' %} aria-current="page"{% endif %}>Glossary</a>
          </li>
          <li class="nav-item">
            <a href="https://lineageos.org" class="nav-link">
              lineageos.org
              <i class="material-icons">open_in_new</i>
            </a>
          </li>
        </ul>

        <form class="form-inline" autocomplete="off">
          <div id="search-container" class="form-group no-border">
            <i class="material-icons">search</i>
            <input id="search-input" type="text" class="form-control" placeholder="Search LineageOS Wiki">
            <ul id="results-container"></ul>
          </div>

          <script src="{{ site.baseurl }}/assets/js/search-ext.js" type="text/javascript"></script>
          <script src="{{ site.baseurl }}/assets/js/jekyll-search.js" type="text/javascript"></script>
          <script type="text/javascript">
              window.simpleJekyllSearch = new SimpleJekyllSearch({
                  searchInput: document.getElementById('search-input'),
                  resultsContainer: document.getElementById('results-container'),
                  json: '{{ "search.json" | relative_url }}',
                  searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
                  noResultsText: '<li><a href="#">{{site.data.strings.search_no_results_text}}</a></li>',
                  limit: 10,
              })
          </script>
        </form>

        <div class="navbar-appearance-row">
          <button id="theme-toggle" class="btn btn-sm theme-toggle-button p-2" type="button" aria-label="Toggle theme" title="Toggle theme">
            <p class="navbar-appearance-label">Use light theme</p>
            <i class="material-icons theme-toggle-icon" aria-hidden="true">light_mode</i>
          </button>
        </div>
      </div>
    </div>
  </nav>
